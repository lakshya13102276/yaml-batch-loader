# =============================================================================
# Pipeline Configuration: Clarizen Data Ingestion
# =============================================================================
# This file mirrors the structure of pipe_config_clarizen.yaml used in the
# TELUS TAG Clarizen data pipeline. Each document entry represents a source
# data type that gets extracted, schema-generated, and loaded into BigQuery.
#
# HOW IT WORKS IN PRODUCTION:
#   1. Airflow DAG reads this YAML from GCS
#   2. Filters to enabled documents only
#   3. Groups into batches of 5
#   4. Each batch becomes a Dataflow job
#   5. Dataflow processes CSV → BigQuery with auto-generated schemas
#
# To add a new data source:
#   1. Add an entry below with enabled: true
#   2. Ensure the source_folder exists in GCS
#   3. The pipeline auto-generates the BQ schema from CSV headers
# =============================================================================

pipeline:
  name: "clarizen_ingestion"
  owner: "Data Warehouse Analytics"
  schedule: "manual"            # This pipeline is triggered manually
  timeout_minutes: 1800         # 30 hours max execution
  default_batch_size: 5         # Documents per Dataflow job
  throttle_seconds: 20          # Delay between job submissions

  # GCP project detection: prj-ea-[d|p|t|s]-dataanalytics-01
  # d=dev, p=prod, t=test, s=staging
  environment: "staging"

documents:
  - document: "Timesheet"
    enabled: true
    source_folder: "timesheet"
    source_directory: "clarizen_raw"
    source_file_delimiter: ","
    dest_dataset: "tag_clarizen_raw"
    dest_table: "timesheet"
    bq_schema_json: "timesheet_schema.json"

  - document: "Project"
    enabled: true
    source_folder: "project"
    source_directory: "clarizen_raw"
    source_file_delimiter: ","
    dest_dataset: "tag_clarizen_raw"
    dest_table: "project"
    bq_schema_json: "project_schema.json"

  - document: "Resource"
